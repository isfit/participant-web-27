name: Build and deploy frontend (Vite) to Azure Web App - participant-web-25

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_frontend:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout the code
      - uses: actions/checkout@v4

      # Step 2: Set up Node.js version
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # Step 3: Install dependencies in the frontend directory
      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      # Step 4: Build the frontend (Compile TypeScript + Vite build)
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

      # Step 5: Ensure the dist folder was generated by listing it
      - name: List frontend directory after build
        run: |
          echo "Listing frontend folder contents"
          ls ./frontend
          echo "Listing frontend/dist folder contents"
          ls ./frontend/dist
        working-directory: ./

      # Step 6: Upload the dist folder for deployment
      - name: Upload artifact for frontend deployment
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: ./frontend/dist  # Ensure the dist folder is uploaded for deployment

  deploy_frontend:
    runs-on: ubuntu-latest
    needs: build_frontend

    steps:
      # Step 7: Download the artifact from the build job
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact

      # Step 8: Log in to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FC599DD607174723A66F9EFBB47E0DAC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_55487918B3224FB3A0FA6A9E83E2498D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_051F9C2D47DD440AAA7EB18EED1E4986 }}

      # Step 9: Deploy to Azure Web App
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'participant-web-25'  # Your Azure Web App name for frontend
          slot-name: 'Production'
          package: frontend/dist  # Use the correct path for the artifact that was uploaded
