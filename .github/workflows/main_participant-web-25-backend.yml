name: Build and deploy Node.js app to Azure Web App - participant-web-25

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout the code
      - uses: actions/checkout@v4

      # Step 2: Set up Node.js version
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # Step 3: Install dependencies in the root directory and build (if necessary)
      - name: Install dependencies in root
        run: |
          npm install
          npm run build --if-present

      # Step 4: Install dependencies in the backend directory
      - name: Install dependencies in backend
        run: |
          cd backend
          npm install

      # Step 5: Upload backend folder as an artifact for deployment
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: app-backend
          path: ./backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write  # Required for requesting the JWT

    steps:
      # Step 6: Download the artifact from the build job
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-backend
      
      # Step 7: Log in to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AEBFCA92A46E4988A768E1ADFD4EE2E9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F01AB4AEAC243CCA489703199DCDEAE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A05054AB079A4D44B424A1D4659E2844 }}

      # Step 8: Deploy to Azure Web App
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'participant-web-25'
          slot-name: 'Production'
          package: .
